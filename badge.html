<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Professionnelle - Lycée Andilamena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary-color: #1a3a5f;
            --secondary-color: #d4af37;
            --text-dark: #2c3e50;
            --bg-light: #f1f2f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-light);
            margin: 0;
            padding: 15px;
            gap: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Stylin'ny Formulaire */
        .editor-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 650px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            box-sizing: border-box;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group.full { grid-column: span 2; }

        .input-group label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .input-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            font-size: 14px;
        }

        /* Ny bokotra */
        .actions {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-download {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .btn-download:hover { background-color: #219653; }

        /* Namboarina ity wrapper ity mba hahafahana manakisaka (scroll) 
           ilay carte amin'ny finday nefa tsy miova habe ilay carte
        */
        .badge-container-scroll {
            width: 100%;
            max-width: 650px;
            overflow-x: auto; /* Ity no mampisy an'ilay dika fisaka */
            padding: 10px 0 20px 0;
            display: block;
            -webkit-overflow-scrolling: touch; /* Ho an'ny iPhone mba halama tsara */
        }

        /* Tazomina raikitra ho an'ny PC sy Finday ny haben'ny Carte */
        .badge {
            width: 650px;
            height: 450px;
            background-color: #ffffff !important;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .watermark {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 120px;
            color: rgba(0,0,0,0.04) !important;
            transform: rotate(-15deg);
            pointer-events: none;
            font-weight: 900;
            z-index: 1;
        }

        .top-bar {
            height: 8px;
            background: linear-gradient(90deg, #1a3a5f, #d4af37) !important;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: #ffffff !important;
            border-bottom: 1px solid #eee;
            z-index: 2;
        }

        .logo { width: 75px; height: 75px; object-fit: contain; }

        .header-content { flex-grow: 1; text-align: center; }

        .header-content p {
            margin: 1px 0; font-size: 14px; color: #666 !important;
            font-weight: 600; text-transform: uppercase;
        }

        .header-content h3 {
            margin: 0; font-size: 14px; color: #1a3a5f !important;
            letter-spacing: 1px; font-weight: 600;
        }

        .school-name {
            font-size: 22px !important; color: #570202 !important;
            font-weight: 600 !important; margin-top: 4px !important;
        }

        .body {
            display: flex; 
            padding: 10px 10px; 
            flex-grow: 1;
            background-color: #f8f9fa !important;
            z-index: 2;
        }

        .photo-container { margin-right: 20px; }

        .photo-div {
            width: 180px; 
            height: 220px;
            border: 3px solid #1a3a5f !important;
            border-radius: 8px;
            background-image: url('photo.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #eee !important;
        }

        .info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }

        .name-display {
            font-size: 28px; font-weight: 900; color: #1a3a5f !important;
            margin: 0 0 5px 0; border-bottom: 2px solid #d4af37 !important;
            text-transform: uppercase;
        }

        .value {
            font-size: 26px; color: #2c3e50 !important;
            font-weight: 700; margin-bottom: 5px;
        }

        .im-tag {
            display: inline-block; background-color: #1a3a5f !important;
            color: white !important; padding: 3px 12px;
            border-radius: 4px; font-weight: bold; font-size: 22px; margin-top: 10px;
        }

        .footer {
            background-color: #570202 !important; color: white !important;
            padding: 10px 30px; font-size: 12px; font-weight: bold;
            z-index: 2;
        }

        /* Responsive ho an'ny Formulaire fotsiny */
        @media (max-width: 680px) {
            .editor-container {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .input-group.full { grid-column: span 1; }
            .actions { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <div class="input-group full">
            <label>Sary (Photo)</label>
            <input type="file" id="inPhoto" accept="image/*" onchange="previewSary(this)">
        </div>

        <div class="input-group">
            <label>Anarana sy Fanampiny</label>
            <input type="text" id="inName" value="IHARILAZA ANDRIAMIZANA" oninput="updateBadge()">
        </div>
        <div class="input-group">
            <label>Andraikitra</label>
            <input type="text" id="inJob" value="Enseignant" oninput="updateBadge()">
        </div>
        <div class="input-group">
            <label>Taranja</label>
            <input type="text" id="inSubject" value="MATHEMATIQUES" oninput="updateBadge()">
        </div>
        <div class="input-group">
            <label>Laharana IM/CIN</label>
            <input type="text" id="inIM" value="IM : 777 777" oninput="updateBadge()">
        </div>
        <div class="actions">
            <button class="btn-download" onclick="alaoSary()">Tehirizo ho sary (JPG)</button>
        </div>
    </div>

    <div class="badge-container-scroll">
        <div class="badge" id="myBadge">
            <div class="watermark">MEN</div>
            <div class="top-bar"></div>

            <div class="header">
                <img src="drapeau.png" alt="Logo" class="logo">
                <div class="header-content">
                    <h3>REPOBLIKAN'I MADAGASIKARA</h3>
                    <p>Ministère de l'Éducation Nationale</p>
                    <p>DREN ALAOTRA MANGORO | CISCO ANDILAMENA</p>
                    <p>ZAP ANDILAMENA CENTRE</p>
                    <p class="school-name">LYCÉE ANDILAMENA</p>
                </div>
                <img src="men.jpg" alt="Logo" class="logo">
            </div>

            <div class="body">
                <div class="photo-container">
                    <div id="displayPhotoDiv" class="photo-div"></div>
                </div>
                
                <div class="info">
                    <div class="name-display" id="displayName">IHARILAZA ANDRIAMIZANA</div>
                    <div class="job-box">
                        <div class="value" id="displayJob">Enseignant</div>
                        <div class="value" id="displaySubject" style="color: #2980b9 !important;">MATHEMATIQUES</div>
                        <div class="im-tag" id="displayIM">IM : 777 777</div>
                    </div>
                </div>
            </div>

            <div class="footer">CARTE PROFESSIONNELLE</div>
        </div>
    </div>

    <script>
        function previewSary(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('displayPhotoDiv').style.backgroundImage = "url('" + e.target.result + "')";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateBadge() {
            document.getElementById('displayName').innerText = document.getElementById('inName').value;
            document.getElementById('displayJob').innerText = document.getElementById('inJob').value;
            document.getElementById('displaySubject').innerText = document.getElementById('inSubject').value;
            document.getElementById('displayIM').innerText = document.getElementById('inIM').value;
        }

        function alaoSary() {
            const badge = document.getElementById('myBadge');
            const anarana = document.getElementById('inName').value;
            
            html2canvas(badge, {
                scale: 3, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#ffffff',
                imageTimeout: 0,
                logging: false
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/jpeg', 0.98);
                const link = document.createElement('a');
                link.download = 'Carte_' + anarana.replace(/\s+/g, '_') + '.jpg';
                link.href = imgData;
                link.click();
            });
        }
    </script>

</body>
</html>
